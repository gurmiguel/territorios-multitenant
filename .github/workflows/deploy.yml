name: Build Docker image for API

on:
  push:
    branches:
      - main
    paths:
      - apps/api/**
      - packages/utils/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/territorios-api

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Build & Push docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish event to webhook
        if: success()
        run: |
          # Construct a payload that Dokploy expects for a push event
          payload=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg sha "${{ github.sha }}" \
            --arg message "${{ github.event.head_commit.message }}" \
            --arg repo "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            '{ ref: $ref, head_commit: { id: $sha, message: $message }, repository: { full_name: $repo }, pusher: { name: $actor } }')

          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Github-Event: push"
            -d "$payload"